<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lily 的英數描寫練習</title>
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lily 描寫">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#4CAF50">
    <style>
        :root {
            --green: #4CAF50;
            --green-dark: #45a049;
            --red: #f44336;
            --red-dark: #da190b;
            --bg: #f4f6f8;
            --card: rgba(255,255,255,0.95);
            --text: #223;
            --muted: #667085;
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overscroll-behavior: none;
            background: linear-gradient(180deg, #eef7ef 0%, #f4f6f8 100%);
            font-family: Arial, "Noto Sans TC", sans-serif;
            color: var(--text);
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }
        .app-shell {
            width: min(100%, 980px);
            box-sizing: border-box;
            padding: 12px 12px calc(env(safe-area-inset-bottom) + 12px);
        }
        .controls {
            margin: 0 0 10px;
            padding: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            position: sticky;
            top: 8px;
            z-index: 10;
            backdrop-filter: blur(8px);
        }
        .title {
            width: 100%;
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .subtitle {
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: var(--muted);
            margin-top: -2px;
            margin-bottom: 4px;
        }
        canvas {
            background-color: #d3d3d3;
            border: 5px solid #fff;
            border-radius: 18px;
            box-shadow: 0 10px 28px rgba(0,0,0,0.12);
            cursor: crosshair;
            touch-action: none;
            display: block;
            width: 100%;
            max-width: 100%;
        }
        button {
            padding: 10px 18px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background-color: var(--green);
            color: white;
            transition: 0.2s;
        }
        button:hover { background-color: var(--green-dark); }
        .clear-btn { background-color: var(--red); }
        .clear-btn:hover { background-color: var(--red-dark); }
        input {
            width: 72px;
            height: 46px;
            font-size: 28px;
            text-align: center;
            border: 2px solid #d0d5dd;
            border-radius: 10px;
            background: #fff;
            text-transform: uppercase;
        }
        label {
            font-size: 17px;
            font-weight: 700;
        }
        .quick-keys {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }
        .chip {
            border: 1px solid #cdd6e1;
            background: #fff;
            color: #344054;
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 15px;
            font-weight: 700;
        }
        .chip.active {
            background: #e8f5e9;
            border-color: #9dd39f;
            color: #1b5e20;
        }
        .footer-note {
            text-align: center;
            color: var(--muted);
            font-size: 13px;
            margin-top: 10px;
        }
        @media (max-width: 640px) {
            .title { font-size: 20px; }
            .controls { padding: 10px; }
            button { font-size: 16px; }
            label { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <div class="controls">
            <div class="title">Lily 的英數描寫練習</div>
            <div class="subtitle">輸入一個字母或數字，直接在灰底上描寫</div>
            <label for="charInput">練習內容：</label>
            <input type="text" id="charInput" maxlength="1" value="A" inputmode="text" aria-label="輸入想練習的內容">
            <button id="updateBtn">更換字母/數字</button>
            <button class="clear-btn" id="clearBtn">清除畫面</button>
            <div class="quick-keys" id="quickKeys">
                <button class="chip active" data-char="A">A</button>
                <button class="chip" data-char="B">B</button>
                <button class="chip" data-char="C">C</button>
                <button class="chip" data-char="1">1</button>
                <button class="chip" data-char="2">2</button>
                <button class="chip" data-char="3">3</button>
            </div>
        </div>

        <canvas id="paintCanvas"></canvas>
        <div class="footer-note">iPhone 可用 Safari 加到主畫面，之後像 App 一樣開啟。</div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const charInput = document.getElementById('charInput');
        const quickKeys = document.getElementById('quickKeys');
        const updateBtn = document.getElementById('updateBtn');
        const clearBtn = document.getElementById('clearBtn');

        let painting = false;
        let scale = Math.max(1, window.devicePixelRatio || 1);

        function resizeCanvas() {
            const controlsHeight = document.querySelector('.controls').offsetHeight || 140;
            const cssWidth = Math.min(window.innerWidth - 24, 956);
            const cssHeight = Math.max(window.innerHeight - controlsHeight - 44, 320);

            canvas.style.width = cssWidth + 'px';
            canvas.style.height = cssHeight + 'px';
            canvas.width = Math.floor(cssWidth * scale);
            canvas.height = Math.floor(cssHeight * scale);
            ctx.setTransform(scale, 0, 0, scale, 0, 0);
            drawTraceText();
        }

        function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            canvas.addEventListener('mousedown', startPosition);
            canvas.addEventListener('mouseup', finishedPosition);
            canvas.addEventListener('mouseleave', finishedPosition);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
            canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            updateBtn.addEventListener('click', updateCanvas);
            clearBtn.addEventListener('click', clearCanvas);
            charInput.addEventListener('input', () => {
                charInput.value = (charInput.value || 'A').slice(0,1).toUpperCase();
                syncQuickKey();
            });
            charInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') updateCanvas();
            });
            quickKeys.addEventListener('click', (e) => {
                const btn = e.target.closest('[data-char]');
                if (!btn) return;
                charInput.value = btn.dataset.char;
                syncQuickKey();
                updateCanvas();
            });

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed', err));
            }
        }

        function syncQuickKey() {
            const value = (charInput.value || '').toUpperCase();
            document.querySelectorAll('.chip').forEach(chip => {
                chip.classList.toggle('active', chip.dataset.char.toUpperCase() === value);
            });
        }

        function handleTouchStart(e) {
            e.preventDefault();
            if (e.touches.length > 0) startPosition(e.touches[0]);
        }

        function handleTouchMove(e) {
            e.preventDefault();
            if (e.touches.length > 0) draw(e.touches[0]);
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            finishedPosition();
        }

        function drawTraceText() {
            const char = (charInput.value || 'A').toUpperCase();
            const width = canvas.width / scale;
            const height = canvas.height / scale;
            ctx.clearRect(0, 0, width, height);

            const size = Math.min(width, height) * 0.6;
            ctx.save();
            ctx.font = `bold ${size}px Arial`;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.48)';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(char, width / 2, height / 2);
            ctx.restore();
        }

        function startPosition(e) {
            painting = true;
            ctx.beginPath();
            draw(e);
        }

        function finishedPosition() {
            painting = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!painting) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            ctx.lineWidth = 20;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#333';
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function clearCanvas() {
            drawTraceText();
        }

        function updateCanvas() {
            charInput.value = (charInput.value || 'A').slice(0,1).toUpperCase();
            syncQuickKey();
            drawTraceText();
        }

        window.onload = init;
    </script>
</body>
</html>
